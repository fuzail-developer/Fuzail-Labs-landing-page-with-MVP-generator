{% extends "base.html" %}
{% block title %}Login | Fuzail Labs{% endblock %}
{% block content %}
<section class="section" style="max-width:560px;margin:auto;">
  <h1 class="fw-bold mb-3">Login</h1>
  <form method="POST" class="card p-4 rounded-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" name="email" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" name="password" required>
    </div>
    <button class="btn btn-brand" type="submit">Login</button>
  </form>
  <p class="text-muted-custom mt-3">No account? <a href="{{ url_for('signup') }}">Create one</a></p>
</section>
{% endblock %}
