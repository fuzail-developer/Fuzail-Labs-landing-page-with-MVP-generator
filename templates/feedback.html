{% extends "base.html" %}
{% block title %}Feedback | Fuzail Labs{% endblock %}
{% block content %}
<section class="section my-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card p-4 p-md-5 rounded-4">
        <h1 class="h3 mb-2">Share Feedback</h1>
        <p class="text-muted-custom mb-4">
          Tell us what is working and what should improve.
        </p>
        <form method="POST" class="row g-3">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <div class="col-md-6">
            <label class="form-label">Name *</label>
            <input type="text" name="name" class="form-control" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Email *</label>
            <input type="email" name="email" class="form-control" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Rating *</label>
            <select name="rating" class="form-select" required>
              <option value="5">5 - Excellent</option>
              <option value="4">4 - Good</option>
              <option value="3">3 - Average</option>
              <option value="2">2 - Needs Work</option>
              <option value="1">1 - Poor</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Feedback Message *</label>
            <textarea
              name="message"
              class="form-control"
              rows="5"
              placeholder="Your feedback..."
              required
            ></textarea>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-warning fw-bold">
              Submit Feedback
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
