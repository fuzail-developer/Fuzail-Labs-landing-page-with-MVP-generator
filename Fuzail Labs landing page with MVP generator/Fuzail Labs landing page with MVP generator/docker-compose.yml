version: '3.8'
services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:5000}
    volumes:
      - ./generated_projects:/app/generated_projects
      - ./logs:/app/logs
