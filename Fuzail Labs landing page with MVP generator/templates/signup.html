{% extends "base.html" %}
{% block title %}Sign Up | Fuzail Labs{% endblock %}
{% block content %}
<section class="section" style="max-width:620px;margin:auto;">
  <h1 class="fw-bold mb-3">Create Account</h1>
  <form method="POST" class="card p-4 rounded-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" class="form-control" name="name" maxlength="120" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" name="email" maxlength="120" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" name="password" minlength="6" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Confirm Password</label>
      <input type="password" class="form-control" name="confirm_password" minlength="6" required>
    </div>
    <button class="btn btn-brand" type="submit">Create Account</button>
  </form>
  <p class="text-muted-custom mt-3">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</section>
{% endblock %}
