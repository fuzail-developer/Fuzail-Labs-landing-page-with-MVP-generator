{% extends "base.html" %}
{% block title %}Blog | Fuzail Labs{% endblock %}
{% block content %}
<section class="section">
  <h1 class="fw-bold mb-4">News & Blog</h1>
  <div class="row g-3">
    {% for post in posts %}
      <div class="col-md-4">
        <article class="card p-3 h-100">
          <h5>{{ post.title }}</h5>
          <p class="text-muted-custom mb-0">{{ post.summary }}</p>
        </article>
      </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
